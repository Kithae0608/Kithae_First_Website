<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나의 첫 웹사이트</title>
    <style>
        /* 여기서부터는 웹사이트를 예쁘게 꾸며주는 CSS 디자인입니다 */
        body {
            background-color: #f0f8ff; /* 연한 파란색 배경 */
            font-family: 'Malgun Gothic', sans-serif; /* 글꼴 설정 */
            text-align: center; /* 가운데 정렬 */
            padding-top: 100px;
        }
        .box {
            background-color: white;
            width: 400px;
            margin: 0 auto; /* 화면 중앙에 박스 배치 */
            padding: 30px;
            border-radius: 15px; /* 모서리 둥글게 */
            box-shadow: 0 4px 8px rgba(0,0,0,0.2); /* 그림자 효과 */
        }
        h1 {
            color: #333333;
        }
        p {
            color: #666666;
            line-height: 1.6;
        }
        button {
            background-color: #008CBA;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background-color: #005f7a; /* 마우스를 올렸을 때 색상 변화 */
        }
    </style>
</head>
<body>

    <!-- 여기서부터는 화면에 보여지는 내용입니다 -->
    <div class="box">
        <h1>안녕하세요! 👋</h1>
        <p>환영합니다.<br>이곳은 제가 처음으로 만들어본 웹사이트입니다.</p>
        <p>코딩이 생각보다 어렵지 않네요!</p>
        
        <!-- 클릭하면 알림창이 뜨는 버튼 -->
        <button onclick="alert('축하합니다! 첫 코딩에 성공하셨습니다 🥳')">클릭해 보세요!</button>
    </div>

</body>
</html>
