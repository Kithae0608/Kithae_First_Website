<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>내이름은 박정호 아니 박종현?</title>
    <style>
        /* 여기서부터는 웹사이트를 예쁘게 꾸며주는 CSS 디자인입니다 */
        body {
            background-color: #f0f8ff; /* 연한 파란색 배경 */
            font-family: 'Malgun Gothic', sans-serif; /* 글꼴 설정 */
            text-align: center; /* 가운데 정렬 */
            padding-top: 100px;
        }
        .box {
            background-color: white;
            width: 600px;
            margin: 0 auto; /* 화면 중앙에 박스 배치 */
            padding: 30px;
            border-radius: 15px; /* 모서리 둥글게 */
            box-shadow: 0 4px 8px rgba(0,0,0,0.2); /* 그림자 효과 */
        }
        h1 {
            color: #333333;
        }
         img {
            max-width: 100%; /* 사진의 최대 넓이를 박스 크기(100%)에 맞춥니다. 박스보다 크면 알아서 줄어듭니다! */
            height: auto; /* 세로 길이는 가로 비율에 맞춰서 자동으로 조절됩니다. */
            border-radius: 10px; /* 사진의 모서리도 둥글게 깎아줍니다. */
            margin-top: 15px; /* 사진 위쪽으로 약간의 틈을 줍니다. */
            margin-bottom: 15px; /* 사진 아래쪽으로 약간의 틈을 줍니다. */
        }
        p {
            color: #666666;
            line-height: 1.6;
        }
        button {
            background-color: #008CBA;
            color: yellow;
            border: none;
            padding: 10px 20px;
            font-size: 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background-color: #005f7a; /* 마우스를 올렸을 때 색상 변화 */
        }
    </style>
</head>
<body>

    <!-- 여기서부터는 화면에 보여지는 내용입니다 -->
    <div class="box">
        <h1>안녕 쌍용건설 박정호 새기님 👋</h1>
        
        <img src="Fuck_개구리.png" alt="내가 넣은 사진">
        
        <p>이거 보여?<br>너도 AI한테 해달라고 해봐</p>
        <p>코딩 할 줄 몰라도 알아서 해주네</p>
        
        <!-- 클릭하면 알림창이 뜨는 버튼 -->
        <button onclick="alert('그래서 제주도 여자는 만났고? 🥳')">클릭해봐!</button>
    </div>

</body>
</html>
